<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth 前端实现</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        .container {
            background: #f6f8fa;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e1e4e8;
        }
        button {
            background-color: #2ea44f;
            border: 1px solid rgba(27, 31, 35, 0.15);
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #2c974b;
        }
        .user-info {
            display: flex;
            align-items: center;
            margin-top: 20px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
        }
        .hidden {
            display: none;
        }
        .error {
            color: #cb2431;
            background-color: #ffdce0;
            border: 1px solid #f97583;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>GitHub OAuth 前端实现</h1>
    
    <div id="loginSection" class="container">
        <p>您需要登录GitHub才能继续。</p>
        <button id="loginBtn">登录 GitHub</button>
    </div>
    
    <div id="userSection" class="container hidden">
        <h2>登录成功</h2>
        <div class="user-info">
            <img id="avatar" class="avatar" src="" alt="用户头像">
            <div>
                <p>欢迎, <span id="username"></span>!</p>
                <p>令牌状态: <span id="tokenStatus">有效</span></p>
            </div>
        </div>
        <button id="logoutBtn">退出登录</button>
    </div>
    
    <div id="errorSection" class="error hidden"></div>

    <script>
        // 配置GitHub OAuth应用信息
        const CLIENT_ID = '你的GitHub OAuth App客户端ID';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const SCOPE = 'user:email'; // 根据你的需求调整权限范围
        
        // 存储键名
        const TOKEN_KEY = 'github_token';
        const EXPIRE_KEY = 'github_token_expire';
        const USER_KEY = 'github_user';
        
        // DOM元素
        const loginSection = document.getElementById('loginSection');
        const userSection = document.getElementById('userSection');
        const errorSection = document.getElementById('errorSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const usernameSpan = document.getElementById('username');
        const avatarImg = document.getElementById('avatar');
        const tokenStatusSpan = document.getElementById('tokenStatus');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', init);
        
        function init() {
            // 检查URL中是否有token（OAuth回调）
            const hashParams = parseHashParams();
            
            if (hashParams.access_token) {
                // 保存token并移除URL中的参数
                saveToken(hashParams.access_token, hashParams.expires_in || 3600);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            
            // 检查是否已登录
            const token = getToken();
            if (token && !isTokenExpired()) {
                // 已登录，获取用户信息
                getUserInfo(token);
            } else if (token && isTokenExpired()) {
                // token过期，尝试刷新
                tokenStatusSpan.textContent = '令牌已过期，正在刷新...';
                refreshToken();
            } else {
                // 未登录
                showLogin();
            }
            
            // 绑定事件
            loginBtn.addEventListener('click', startOAuth);
            logoutBtn.addEventListener('click', logout);
            
            // 设置定期检查token状态
            setInterval(checkTokenStatus, 60000); // 每分钟检查一次
        }
        
        function parseHashParams() {
            const hash = window.location.hash.substring(1);
            const result = {};
            hash.split('&').forEach(part => {
                const item = part.split('=');
                result[item[0]] = decodeURIComponent(item[1]);
            });
            return result;
        }
        
        function startOAuth() {
            const authUrl = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=${SCOPE}&response_type=token`;
            window.location.href = authUrl;
        }
        
        function saveToken(token, expiresIn) {
            const expireTime = Date.now() + (expiresIn * 1000);
            localStorage.setItem(TOKEN_KEY, token);
            localStorage.setItem(EXPIRE_KEY, expireTime.toString());
        }
        
        function getToken() {
            return localStorage.getItem(TOKEN_KEY);
        }
        
        function isTokenExpired() {
            const expireTime = localStorage.getItem(EXPIRE_KEY);
            if (!expireTime) return true;
            return Date.now() > parseInt(expireTime);
        }
        
        async function getUserInfo(token) {
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${token}`
                    }
                });
                
                if (response.ok) {
                    const userData = await response.json();
                    displayUserInfo(userData);
                    showUserSection();
                    
                    // 存储用户信息
                    localStorage.setItem(USER_KEY, JSON.stringify(userData));
                } else {
                    throw new Error('获取用户信息失败');
                }
            } catch (error) {
                showError('获取用户信息时出错: ' + error.message);
                showLogin();
            }
        }
        
        function displayUserInfo(user) {
            usernameSpan.textContent = user.login || user.name;
            avatarImg.src = user.avatar_url;
        }
        
        // 注意：隐式授权流程本身不支持刷新令牌，这里需要重新授权
        function refreshToken() {
            // 清除旧token
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(EXPIRE_KEY);
            
            // 尝试使用隐藏的iframe静默刷新
            trySilentRefresh();
        }
        
        function trySilentRefresh() {
            // 创建一个隐藏的iframe尝试静默重新授权
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=${SCOPE}&response_type=token&prompt=none`;
            
            iframe.onload = function() {
                // 检查URL是否有变化（获取token）
                setTimeout(() => {
                    const hashParams = parseHashParams();
                    if (hashParams.access_token) {
                        saveToken(hashParams.access_token, hashParams.expires_in || 3600);
                        window.location.reload();
                    } else {
                        // 静默刷新失败，需要用户交互
                        tokenStatusSpan.textContent = '令牌已过期';
                    }
                }, 1000);
            };
            
            document.body.appendChild(iframe);
        }
        
        function checkTokenStatus() {
            if (getToken() && isTokenExpired()) {
                tokenStatusSpan.textContent = '令牌已过期，正在刷新...';
                refreshToken();
            }
        }
        
        function logout() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(EXPIRE_KEY);
            localStorage.removeItem(USER_KEY);
            showLogin();
        }
        
        function showLogin() {
            userSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
        }
        
        function showUserSection() {
            loginSection.classList.add('hidden');
            errorSection.classList.add('hidden');
            userSection.classList.remove('hidden');
        }
        
        function showError(message) {
            errorSection.textContent = message;
            errorSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
