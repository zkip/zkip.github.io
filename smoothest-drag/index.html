<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smoothest Drag</title>
    <script src="./main.js"></script>
    <style>
      /* .master {
        border: 1px solid rebeccapurple;
        width: 100%;
        height: 100%;
      } */

      #stage,
      .flag {
        position: absolute;
        top: 8px;
        bottom: 8px;
        left: 8px;
        right: 8px;
        flex: 1;
        display: flex;
        gap: 8px;
      }

      #stage > canvas {
        border: 1px solid rebeccapurple;
        flex: 1;
        min-width: 0;
        min-height: 0;
      }

      html {
        height: 100%;
      }

      body {
        min-height: 100%;
        margin: 0;
        box-sizing: border-box;
      }

      .flag {
        /* position: ; */
        pointer-events: none;
        padding-top: 8px;
        padding-left: 8px;
        color: darkslategray;
      }

      .flag .slave {
        position: absolute;
        left: calc(50% + 16px);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas class="master"></canvas>
      <canvas class="slave"></canvas>
    </div>
    <div class="flag">
      <div class="master">draw on animationFrame</div>
      <div class="slave">draw on mousemove</div>
    </div>
  </body>
</html>
